name: CI - Edge Analytics (Stage 1)

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
      
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
        timeout-minutes: 30
      
      - name: Code formatting (Black)
        run: |
          black --version
          black --check src tests || true
      
      - name: Linting (Flake8)
        run: |
          flake8 src tests --max-line-length=100 --count --statistics || true
      
      - name: Type checking (MyPy)
        run: |
          mypy src --ignore-missing-imports || true
      
      - name: Run Unit Tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        timeout-minutes: 15
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install pip
        run: |
          python -m pip install --upgrade pip
      
      - name: Check for hardcoded secrets
        run: |
          ! grep -r "password\|secret\|api_key" src tests --ignore-case || true
      
      - name: Install safety
        run: |
          pip install safety
          safety check || true
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t medtech-edge-analytics:${{ github.sha }} .
      
      - name: Test Docker image
        run: |
          docker run --rm \
            medtech-edge-analytics:${{ github.sha }} \
            python --version

  status-check:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build-and-test, security, docker-build]
    if: always()
    
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "⚠️ Build/test failed"
            exit 1
          fi
          if [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "⚠️ Docker build failed"
            exit 1
          fi
          echo "✅ All critical checks passed!"
