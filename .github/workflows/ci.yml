name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Static analysis & formatting
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Black — formatting check
        run: black --check src tests

      - name: Flake8 — style & errors
        run: flake8 src tests --max-line-length=100 --count --statistics

      - name: MyPy — type checking
        run: mypy src --ignore-missing-imports

  # ─────────────────────────────────────────────────────────────────────────────
  # Unit tests + coverage
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        timeout-minutes: 15

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # SAST + dependency audit
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install security scanners
        run: pip install bandit[toml] pip-audit

      - name: Bandit — SAST scan
        run: bandit -r src -ll

      - name: pip-audit — dependency vulnerabilities
        run: pip-audit -r requirements.txt
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Build image locally and run the composite smoke test
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: medtech-edge-analytics:ci

      - name: Run smoke test
        uses: ./.github/actions/smoke-test
        with:
          image: medtech-edge-analytics:ci
          # No registry-token — image is already loaded on this runner

  # ─────────────────────────────────────────────────────────────────────────────
  # Aggregate gate: fails the pipeline if any required job did not succeed
  # ─────────────────────────────────────────────────────────────────────────────
  status:
    name: Status
    runs-on: ubuntu-latest
    needs: [lint, test, security, smoke-test]
    if: always()

    steps:
      - name: Check required jobs
        shell: bash
        run: |
          results=(
            "lint=${{ needs.lint.result }}"
            "test=${{ needs.test.result }}"
            "security=${{ needs.security.result }}"
            "smoke-test=${{ needs.smoke-test.result }}"
          )
          failed=false
          for entry in "${results[@]}"; do
            job="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" ]]; then
              echo "FAIL: $job -> $result"
              failed=true
            else
              echo "OK:   $job -> $result"
            fi
          done
          if [[ "$failed" == "true" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
